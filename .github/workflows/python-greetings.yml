name: CI/CD Pipeline
on: [push]

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deps

  deploy-to-dev:
    needs: install-pip-deps
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          env_name: 'dev'
          port: '7001'

  tests-on-dev:
    needs: deploy-to-dev
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-tests
        with:
          env_name: 'dev'

  deploy-to-stg:
    needs: tests-on-dev
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          env_name: 'stg'
          port: '7002'

  tests-on-stg:
    needs: deploy-to-stg
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-tests
        with:
          env_name: 'stg'

  deploy-to-preprod:
    needs: tests-on-stg
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          env_name: 'preprod'
          port: '7003'

  tests-on-preprod:
    needs: deploy-to-preprod
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-tests
        with:
          env_name: 'preprod'

  deploy-to-prod:
    needs: tests-on-preprod
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          env_name: 'prod'
          port: '7004'

  Tests-on-prod:
    needs: deploy-to-prod
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-tests
        with:
          env_name: 'prod'